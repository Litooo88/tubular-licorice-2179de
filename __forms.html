<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<title>Netlify Forms | Nordic E-Mobility</title>
</head>
<body>
<form name="newsletter" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="form-name" value="newsletter">
  <input type="hidden" name="subject" value="Nyhetsbrev Nordic E-Mobility">
  <input type="email" name="email">
  <input type="text" name="source">
  <input type="text" name="discountCode">
  <input type="text" name="bot-field">
</form>
<form name="angerratt" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="form-name" value="angerratt">
  <input type="hidden" name="subject" value="ÅNGERRÄTT – kund utövar ångerrätt (svara med bekräftelse!)">
  <input type="text" name="namn">
  <input type="email" name="email">
  <input type="tel" name="telefon">
  <input type="text" name="ordernummer">
  <input type="text" name="produkt">
  <input type="text" name="leveransdatum">
  <textarea name="meddelande"></textarea>
  <input type="text" name="skickat">
  <input type="text" name="bot-field">
</form>
</body>
</html>
