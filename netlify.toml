[build]
  publish = "."
  functions = "netlify/functions"
  command = "npm run build"

[build.environment]
  NPM_FLAGS = "--no-audit --no-fund"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@netlify/blobs", "stripe"]

# nemob-os/ är ett lokalt internverktyg (personlig data) och får aldrig
# serveras publikt. publish är "." så mappen måste blockeras uttryckligen.
[[redirects]]
  from = "/nemob-os/*"
  to = "/404"
  status = 404
  force = true

[[redirects]]
from = "https://nordicemobility.com/*"
to = "https://www.nordicemobility.se/:splat"
status = 301
force = true

[[redirects]]
from = "https://www.nordicemobility.com/*"
to = "https://www.nordicemobility.se/:splat"
status = 301
force = true

[[redirects]]
from = "https://sv.nordicemobility.com/*"
to = "https://www.nordicemobility.se/:splat"
status = 301
force = true

[[redirects]]
  from = "/nordic-emobility-site"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/nordic-emobility-site/*"
  to = "/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/service-page/el-elektronik"
  to = "/elscooter-reparation-orebro/"
  status = 301

[[redirects]]
  from = "/service-page/batteri"
  to = "/batterireparation-elscooter/"
  status = 301

[[redirects]]
  from = "/service-page/punktering"
  to = "/punktering-elscooter-orebro/"
  status = 301

[[redirects]]
  from = "/service-page/*"
  to = "/book-online/"
  status = 301

# Wix-arvda paths som inte finns pa .se-sajten.
# Innan dessa: wildcard-redirect fran .com gjorde att gamla .com-URLer
# landade pa motsvarande .se-path som 404:ade -> SEO-laeckage (300+ exp/manad).
[[redirects]]
  from = "/elscooter-service-orebro"
  to = "/elscooter-reparation-orebro/"
  status = 301

[[redirects]]
  from = "/boka-service"
  to = "/book-online/"
  status = 301

[[redirects]]
  from = "/pricing-plans/list"
  to = "/priser/"
  status = 301

[[redirects]]
  from = "/pricing-plans/*"
  to = "/priser/"
  status = 301

[[redirects]]
  from = "/category/nya-elscootrar"
  to = "/nya-elscootrar/"
  status = 301

[[redirects]]
  from = "/category/*"
  to = "/nya-elscootrar/"
  status = 301

# Produktsidor pa gamla Wix: fanns enskilda /product-page/<slug>-routes.
# Vi har ingen 1:1 mappning - skicka till nya-elscootrar/ (riktigt produkt-katalog)
# istallet for tidigare hash-anchor /#produkter (laddade hem + scroll, ingen SEO-vinning).
[[redirects]]
  from = "/product-page/*"
  to = "/nya-elscootrar/"
  status = 301

[[redirects]]
  from = "/bookings-checkout/*"
  to = "/book-online/"
  status = 301

[[redirects]]
  from = "/book-online"
  to = "/book-online/"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/__forms.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
