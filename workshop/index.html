<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Workshop | Nordic E-Mobility</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Inter,Arial,sans-serif;background:#060806;color:#f5f7f4}
a{color:#00c853}.wrap{max-width:1180px;margin:0 auto;padding:18px}
.top{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:14px}
h1{font-size:32px;margin:0 0 6px}.muted{color:#9ea79f;line-height:1.45}.nav{display:flex;gap:10px;flex-wrap:wrap}
.panel,.job{background:#101410;border:1px solid #28322a;border-radius:8px}.panel{padding:14px;margin-bottom:14px}
label{display:block;font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:#a8b2aa;font-weight:900;margin-bottom:6px}
input,select,textarea{width:100%;background:#060806;border:1px solid #303a32;border-radius:8px;color:#fff;padding:13px;font:inherit}
textarea{min-height:86px;resize:vertical}
button{border:0;border-radius:8px;background:#00c853;color:#031006;font-weight:900;padding:13px 14px;cursor:pointer;font-size:15px}
button.secondary{background:transparent;color:#fff;border:1px solid #d7ded9}
button.warn{background:#ffc247;color:#1d1200}
button.danger{background:#ff5a5f;color:#260306}
button:disabled{opacity:.6;cursor:wait}
.help{display:inline-grid;place-items:center;width:26px;height:26px;padding:0;border-radius:999px;border:1px solid #53605a;background:#151b16;color:#dce5df;font-weight:900}
.login{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:end}.filters{display:grid;grid-template-columns:1fr 220px;gap:10px}
.jobs{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:12px}.job{padding:14px}
.job-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.job h2{font-size:21px;margin:0}
.badge{display:inline-flex;border-radius:999px;background:rgba(0,200,83,.12);border:1px solid rgba(0,200,83,.3);color:#aaffc6;font-size:11px;font-weight:900;padding:4px 8px;white-space:nowrap}
.badge.warn{background:rgba(255,194,71,.12);border-color:rgba(255,194,71,.35);color:#ffe0a3}
.facts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}.fact{border:1px solid #263029;border-radius:8px;background:#090d09;padding:9px}.fact span{display:block;color:#9ea79f;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.06em}.fact b{display:block;margin-top:4px}
.box{border-left:3px solid #00c853;padding:8px 0 8px 10px;margin:10px 0;color:#e4ebe6;line-height:1.5}.box.stop{border-color:#ffc247;color:#fff1cf}.box.review{border-color:#ff5a5f;color:#ffe1e3}
.quick-actions{border:1px solid #263029;border-radius:8px;background:#090d09;padding:10px;margin-top:10px}
.quick-actions-head{display:flex;justify-content:space-between;gap:8px;align-items:center;margin-bottom:8px}
.quick-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.check-tile{display:flex;gap:9px;align-items:flex-start;border:1px solid #303a32;border-radius:8px;padding:11px;background:#0d120e;font-weight:900;line-height:1.2;min-height:58px}
.check-tile input{width:auto;margin-top:2px;accent-color:#00c853}.check-tile small{display:block;color:#9ea79f;font-size:11px;margin-top:4px;font-weight:700}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.photo-box{border:1px solid #263029;border-radius:8px;background:#060806;padding:10px}.photo-box strong{display:block;margin-bottom:8px}.thumbs{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin:8px 0}.thumb{aspect-ratio:1;background:#0b110c;border-radius:6px;overflow:hidden}.thumb img{width:100%;height:100%;object-fit:cover;display:block}.photo-box input{font-size:12px;padding:9px}.photo-box button{width:100%;margin-top:7px;padding:10px;font-size:13px}
.log-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-top:10px}.log-actions{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:center}.status-actions{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}.status-actions .wide{grid-column:1/-1}
.card-status{display:none;margin:10px 0;border-radius:8px;padding:10px 12px;line-height:1.45;background:rgba(0,200,83,.1);border:1px solid rgba(0,200,83,.3);color:#e6ffef}.card-status.bad{background:rgba(255,90,95,.12);border-color:rgba(255,90,95,.4);color:#ffe1e3}.card-status.show{display:block}
.status{display:none;margin:10px 0;border-radius:8px;padding:11px 12px;line-height:1.45}.status.ok{display:block;background:rgba(0,200,83,.1);border:1px solid rgba(0,200,83,.3);color:#e6ffef}.status.bad{display:block;background:rgba(255,90,95,.12);border:1px solid rgba(255,90,95,.4);color:#ffe1e3}.empty{border:1px dashed #313b33;border-radius:8px;padding:18px;text-align:center;color:#8f9991}
@media(max-width:780px){.wrap{padding:12px}.top,.login,.filters{display:block}.nav{margin-top:10px}.photo-grid,.facts,.status-actions,.quick-grid,.log-actions{grid-template-columns:1fr}button,.login button{width:100%;margin-top:8px}.help{width:100%;height:auto;padding:10px}}
</style>
<script>
window.NORDIC_ANALYTICS={ga4MeasurementId:"G-WR90F2DZ4S",gtmContainerId:"",debugMode:new URLSearchParams(window.location.search).has("ga_debug")};
</script>
<script src="/assets/analytics.js" defer></script>
</head>
<body>
<main class="wrap">
  <div class="top">
    <div><h1>Workshop</h1><p class="muted">Lennart-l&auml;ge: g&ouml;r jobbet, dokumentera, flagga Sebastian. Inga pris&auml;ndringar och inga kundutskick.</p></div>
    <div class="nav"><a href="/admin/">Admin</a><a href="/checkout/">Checkout</a><a href="/quick-price/">Snabbpris</a></div>
  </div>

  <section class="panel">
    <div class="login">
      <div><label for="token">Admin-token</label><input id="token" type="password"></div>
      <button id="saveToken">Spara token</button>
      <button class="secondary" id="refresh">Uppdatera</button>
    </div>
  </section>

  <section class="panel">
    <div class="filters">
      <div><label for="search">S&ouml;k jobb</label><input id="search" placeholder="Kund, modell, &auml;rende, problem"></div>
      <div><label for="statusFilter">Visa</label><select id="statusFilter"><option value="">Aktiva/inl&auml;mnade</option><option value="checked_in">Inl&auml;mnade</option><option value="diagnosing">Diagnos</option><option value="repairing">P&aring;g&aring;ende</option><option value="waiting_parts">V&auml;ntar del</option><option value="waiting_customer">Paus/review</option><option value="ready">Ready for payment</option></select></div>
    </div>
    <div class="status" id="status"></div>
  </section>

  <section class="jobs" id="jobs"><div class="empty">Laddar jobb...</div></section>
</main>

<script>
const tokenInput=document.getElementById('token'),jobsEl=document.getElementById('jobs'),statusEl=document.getElementById('status'),searchInput=document.getElementById('search'),statusFilter=document.getElementById('statusFilter');
let cases=[];
const statusLabels={new:'Ny',contacted:'Kontaktad',checked_in:'Inlämnad',diagnosing:'Diagnos',repairing:'Pågår',waiting_parts:'Väntar del',waiting_customer:'Paus/review',ready:'Ready for payment',done:'Avslutad'};
const photoLabels={before:'Före',during:'Under arbete',after:'Efter'};
const actionLabels={
  wheel_remove:['Demontering av hjul','Hjul demonterat för åtkomst.'],
  tube_replace:['Byte av slang','Slang bytt och lufttryck kontrollerat.'],
  tire_replace:['Byte av däck','Däck bytt och monterat.'],
  solid_tire_install:['Montering punkteringsfritt däck','Punkteringsfritt däck monterat.'],
  tubeless_sealant:['Tubeless/slime-åtgärd','Tätningsvätska/slime åtgärdad.'],
  brake_adjust:['Bromsjustering','Bromsar justerade och funktionstestade.'],
  brake_part_replace:['Byte av bromsdel','Bromsdel bytt.'],
  throttle_replace:['Byte av gashandtag/tumgas','Gashandtag/tumgas bytt och testat.'],
  display_replace:['Byte av display','Display bytt och funktionstestad.'],
  wiring_check:['Kontroll kablage/kontakter','Kablage och kontakter kontrollerade.'],
  battery_diagnostics:['Batteridiagnos','Batteri/BMS kontrollerat.'],
  bms_check:['Kontroll av BMS','BMS kontrollerat.'],
  test_run:['Funktionstest','Funktionstest genomfört.'],
  safety_check:['Säkerhetskontroll','Säkerhetskontroll utförd.']
};
tokenInput.value=localStorage.getItem('nordicAdminToken')||'';
function html(v){return String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function shortId(id){return String(id||'').replace(/^case_/,'').slice(0,18).toUpperCase()}
function setStatus(msg,bad=false){statusEl.textContent=msg||'';statusEl.className='status '+(msg?(bad?'bad':'ok'):'')}
function cardStatus(card,msg,bad=false){const el=card.querySelector('.card-status');el.textContent=msg||'';el.className='card-status '+(msg?'show ':'')+(bad?'bad':'')}
function info(text,card){if(card)cardStatus(card,text);else setStatus(text)}
async function api(path,options={}){const response=await fetch(path,{...options,headers:{'Content-Type':'application/json','x-admin-token':tokenInput.value.trim(),...(options.headers||{})}});const data=await response.json().catch(()=>({}));if(!response.ok)throw new Error(data.error||'Kunde inte läsa data.');return data}
function activeCases(){const allowed=['checked_in','diagnosing','repairing','waiting_parts','waiting_customer','ready'];return cases.filter(item=>allowed.includes(item.status))}
function approvedWork(item){const rows=item.completion&&Array.isArray(item.completion.priceRows)?item.completion.priceRows:[];if(rows.length)return rows.map(row=>`${row.qty||1} x ${row.name}`).join(', ');return item.completion&&item.completion.workSummary||item.service||'Inte specificerat ännu'}
function doNotDo(item){const internal=item.completion&&item.completion.internalComment;return internal||'Gör inget utanför godkänt arbete/pris utan Sebastian eller kundgodkännande.'}
function nextAction(item){if(item.workshop&&item.workshop.needsSebastianReview)return'Stoppa och invänta Sebastian review.';if(item.status==='waiting_parts')return'Vänta på del, dokumentera vad som saknas.';if(item.status==='ready')return'Redo för betalning/utlämning. Gå till Checkout när kunden hämtar.';if(item.status==='repairing')return'Fortsätt jobbet och dokumentera före/under/efter.';return'Tryck Start job när arbetet faktiskt påbörjas.'}
function mediaFor(item,category){return (Array.isArray(item.media)?item.media:[]).filter(entry=>entry.category===category).slice(0,3)}
function photoHtml(item,category){const thumbs=mediaFor(item,category).map(entry=>`<a class="thumb" href="${html(entry.url)}" target="_blank" rel="noopener"><img src="${html(entry.url)}" alt="${html(photoLabels[category])}"></a>`).join('');return `<div class="photo-box"><strong>${photoLabels[category]}</strong><div class="thumbs">${thumbs||'<div class="muted">Ingen bild</div>'}</div><input type="file" accept="image/*" capture="environment" data-category="${category}"><button type="button" class="secondary upload-photo" data-category="${category}">Ladda upp ${photoLabels[category].toLowerCase()}</button></div>`}
function selectedActions(card){return [...card.querySelectorAll('[name="serviceActions"]:checked')].map(input=>input.value)}
function generatedSummary(actions){return actions.map(key=>actionLabels[key]&&actionLabels[key][1]).filter(Boolean).join('\n')}
function render(){const q=searchInput.value.trim().toLowerCase();const visible=activeCases().filter(item=>!statusFilter.value||item.status===statusFilter.value).filter(item=>!q||[item.customer&&item.customer.name,item.vehicle&&item.vehicle.model,item.service,item.message,shortId(item.id)].join(' ').toLowerCase().includes(q));jobsEl.innerHTML=visible.length?'':'<div class="empty">Inga aktiva/inlämnade jobb matchar filtret.</div>';visible.forEach(item=>jobsEl.appendChild(jobCard(item)))}
function jobCard(item){
  const card=document.createElement('article');card.className='job';
  const customer=item.customer||{},vehicle=item.vehicle||{},workshop=item.workshop||{};
  const storedActions=Array.isArray(workshop.serviceActions)?workshop.serviceActions:[];
  const quickTiles=Object.entries(actionLabels).map(([key,data])=>`<label class="check-tile"><input type="checkbox" name="serviceActions" value="${key}" ${storedActions.includes(key)?'checked':''}><span>${html(data[0])}<small>${html(data[1])}</small></span></label>`).join('');
  card.innerHTML=`<div class="job-head"><div><h2>${html(customer.name||'Okänd kund')}</h2><div class="muted">${html(vehicle.model||'Okänd modell')} · ${shortId(item.id)}</div></div><span class="badge ${workshop.needsSebastianReview?'warn':''}">${html(workshop.needsSebastianReview?'Sebastian review':statusLabels[item.status]||item.status)}</span></div>
  <div class="facts"><div class="fact"><span>Telefon</span><b>${html(customer.phone||'Saknas')}</b></div><div class="fact"><span>Status</span><b>${html(statusLabels[item.status]||item.status)}</b></div></div>
  <div class="box"><strong>Problem</strong><br>${html(item.message||item.service||'Ingen beskrivning')}</div>
  <div class="box"><strong>Godkänt arbete</strong><br>${html(approvedWork(item))}</div>
  <div class="box stop"><strong>Gör inte utan godkännande</strong><br>${html(doNotDo(item))}</div>
  <div class="box ${workshop.needsSebastianReview?'review':''}"><strong>Nästa steg</strong><br>${html(workshop.nextAction||nextAction(item))}</div>
  <div class="quick-actions"><div class="quick-actions-head"><strong>Snabbval arbetsmoment</strong><button type="button" class="help" data-info="Klicka i det som faktiskt gjorts. Texten läggs i arbetsloggen och sparas på ärendet.">?</button></div><div class="quick-grid">${quickTiles}</div></div>
  <div class="photo-grid">${photoHtml(item,'before')}${photoHtml(item,'during')}${photoHtml(item,'after')}</div>
  <div class="log-grid"><label>Vad gjordes?</label><textarea name="workDone">${html(workshop.workDone||'')}</textarea><label>Delar använda</label><textarea name="partsUsed">${html(workshop.partsUsed||'')}</textarea><label>Problem / avvikelser</label><textarea name="issuesFound">${html(workshop.issuesFound||'')}</textarea><div class="log-actions"><button type="button" class="secondary save-log">Spara logg</button><button type="button" class="submit-log">Skicka logg till Sebastian</button><button type="button" class="help" data-info="Spara logg lagrar på ärendet. Skicka logg sparar samma logg och skickar en SMS-sammanfattning till Sebastian.">?</button></div></div>
  <div class="status-actions"><button type="button" data-action="start">Start job</button><button type="button" class="secondary" data-action="paused">Pausad</button><button type="button" class="secondary" data-action="waiting_parts">Väntar del</button><button type="button" class="warn" data-action="review">Behöver Sebastian review</button><button type="button" class="wide" data-action="ready">Ready for payment</button><button type="button" class="help wide" data-info="Start job sätter status Pågår. Pausad/Väntar del flyttar ärendet till rätt vänteläge. Sebastian review skickar ingen kundinfo, den flaggar bara internt. Ready for payment gör ärendet klart för Checkout.">Vad gör knapparna?</button></div><div class="card-status"></div>`;
  card.querySelectorAll('.upload-photo').forEach(button=>button.addEventListener('click',()=>uploadPhoto(item,card,button.dataset.category)));
  card.querySelector('.save-log').addEventListener('click',()=>saveLog(item,card,false));
  card.querySelector('.submit-log').addEventListener('click',()=>saveLog(item,card,true));
  card.querySelectorAll('[data-action]').forEach(button=>button.addEventListener('click',()=>setJobState(item,card,button.dataset.action,button)));
  card.querySelectorAll('.help').forEach(button=>button.addEventListener('click',()=>info(button.dataset.info,card)));
  card.querySelectorAll('[name="serviceActions"]').forEach(input=>input.addEventListener('change',()=>applyGeneratedSummary(card)));
  return card;
}
function applyGeneratedSummary(card){const text=generatedSummary(selectedActions(card));const area=card.querySelector('[name="workDone"]');if(!text)return;if(!area.value.trim()){area.value=text;return}const missing=text.split('\n').filter(line=>!area.value.includes(line));if(missing.length)area.value=`${area.value.trim()}\n${missing.join('\n')}`;}
function workshopValues(card){return{workDone:card.querySelector('[name="workDone"]').value,partsUsed:card.querySelector('[name="partsUsed"]').value,issuesFound:card.querySelector('[name="issuesFound"]').value,serviceActions:selectedActions(card)}}
async function patchCase(item,payload){await api('/api/cases/'+encodeURIComponent(item.id),{method:'PATCH',body:JSON.stringify(payload)});await loadCases(true)}
async function saveLog(item,card,submit=false){try{setStatus(submit?'Skickar logg till Sebastian...':'Sparar logg...');cardStatus(card,submit?'Skickar logg till Sebastian...':'Sparar logg...');const payload=submit?{action:'submit_workshop_log',workshop:workshopValues(card)}:{workshop:workshopValues(card),note:'Workshoplogg uppdaterad.'};const data=await api('/api/cases/'+encodeURIComponent(item.id),{method:'PATCH',body:JSON.stringify(payload)});await loadCases(true);const ok=submit?data.ok!==false:true;setStatus(submit?(ok?'Logg skickad till Sebastian via SMS.':'Loggen sparades men SMS kunde inte skickas.'):'Logg sparad.',!ok);cardStatus(card,submit?(ok?'Logg skickad till Sebastian via SMS.':'Loggen sparades men SMS kunde inte skickas.'):'Logg sparad.',!ok)}catch(error){setStatus(error.message,true);cardStatus(card,error.message,true)}}
async function setJobState(item,card,action,button){try{const values=workshopValues(card);const map={start:{status:'repairing',nextAction:'Fortsätt jobbet och dokumentera före/under/efter.',review:false,note:'Workshop: jobb startat.'},paused:{status:'waiting_customer',nextAction:'Pausad. Skriv varför i loggen och invänta nästa beslut.',review:false,note:'Workshop: jobb pausat.'},waiting_parts:{status:'waiting_parts',nextAction:'Väntar på del. Dokumentera del i loggen.',review:false,note:'Workshop: väntar på del.'},review:{status:'waiting_customer',nextAction:'Sebastian behöver granska innan kund kontaktas eller arbetet fortsätter.',review:true,note:'Workshop: Needs Sebastian review.'},ready:{status:'ready',nextAction:'Ready for payment. Gå till Checkout när kunden hämtar.',review:false,note:'Workshop: ready for payment.'}}[action];if(!map)return;button.disabled=true;setStatus('Uppdaterar status...');cardStatus(card,'Uppdaterar status...');await patchCase(item,{status:map.status,workshop:{...values,nextAction:map.nextAction,needsSebastianReview:map.review,reviewRequestedAt:map.review?new Date().toISOString():null},note:map.note});setStatus(`Status uppdaterad: ${statusLabels[map.status]||map.status}.`);cardStatus(card,`Status uppdaterad: ${statusLabels[map.status]||map.status}.`)}catch(error){setStatus(error.message,true);cardStatus(card,error.message,true)}finally{button.disabled=false}}
async function uploadPhoto(item,card,category){try{const input=card.querySelector(`input[data-category="${category}"]`);if(!input.files||!input.files.length){setStatus('Välj en bild först.',true);cardStatus(card,'Välj en bild först.',true);return}const form=new FormData();form.append('category',category);form.append('publicOk','false');form.append('note',photoLabels[category]);[...input.files].forEach(file=>form.append('files',file,file.name));setStatus('Laddar upp bild...');cardStatus(card,'Laddar upp bild...');const response=await fetch('/api/cases/'+encodeURIComponent(item.id)+'/media',{method:'POST',headers:{'x-admin-token':tokenInput.value.trim()},body:form});const data=await response.json().catch(()=>({}));if(!response.ok)throw new Error(data.error||'Kunde inte ladda upp bild.');input.value='';await loadCases(true);setStatus('Bild uppladdad.');cardStatus(card,'Bild uppladdad.')}catch(error){setStatus(error.message,true);cardStatus(card,error.message,true)}}
async function loadCases(background=false){try{if(!background)setStatus('Laddar jobb...');const data=await api('/api/cases');cases=data.cases||[];render();if(!background)setStatus(`Laddat ${activeCases().length} aktiva/inlämnade jobb.`)}catch(error){setStatus(error.message,true)}}
document.getElementById('saveToken').addEventListener('click',()=>{localStorage.setItem('nordicAdminToken',tokenInput.value.trim());setStatus('Token sparad.');loadCases()});
document.getElementById('refresh').addEventListener('click',()=>loadCases());
searchInput.addEventListener('input',render);
statusFilter.addEventListener('change',render);
loadCases();
setInterval(()=>loadCases(true),30000);
</script>
</body>
</html>
