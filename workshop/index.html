<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Workshop | Nordic E-Mobility</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:#060806;color:#f5f7f4}a{color:#00c853}.wrap{max-width:1180px;margin:0 auto;padding:18px}.top{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:14px}h1{font-size:32px;margin:0 0 6px}.muted{color:#9ea79f;line-height:1.45}.nav{display:flex;gap:10px;flex-wrap:wrap}.panel,.job{background:#101410;border:1px solid #28322a;border-radius:8px}.panel{padding:14px;margin-bottom:14px}label{display:block;font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:#a8b2aa;font-weight:900;margin-bottom:6px}input,select,textarea{width:100%;background:#060806;border:1px solid #303a32;border-radius:8px;color:#fff;padding:13px;font:inherit}textarea{min-height:82px;resize:vertical}button{border:0;border-radius:8px;background:#00c853;color:#031006;font-weight:900;padding:13px 14px;cursor:pointer;font-size:15px}button.secondary{background:transparent;color:#fff;border:1px solid #d7ded9}button.warn{background:#ffc247;color:#1d1200}button.danger{background:#ff5a5f;color:#fff}button:disabled{opacity:.6;cursor:wait}.login{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:end}.filters{display:grid;grid-template-columns:1fr 220px;gap:10px}.jobs{display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:12px}.job{padding:14px}.job.active{grid-column:1/-1;border-color:#00c853}.job-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.job h2{font-size:21px;margin:0}.badge{display:inline-flex;border-radius:999px;background:rgba(0,200,83,.12);border:1px solid rgba(0,200,83,.3);color:#aaffc6;font-size:11px;font-weight:900;padding:4px 8px;white-space:nowrap}.badge.warn{background:rgba(255,194,71,.12);border-color:rgba(255,194,71,.35);color:#ffe0a3}.facts{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0}.fact{border:1px solid #263029;border-radius:8px;background:#090d09;padding:9px}.fact span{display:block;color:#9ea79f;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.06em}.fact b{display:block;margin-top:4px;word-break:break-word}.box{border-left:3px solid #00c853;padding:8px 0 8px 10px;margin:10px 0;color:#e4ebe6;line-height:1.5}.box.stop{border-color:#ffc247;color:#fff1cf}.box.review{border-color:#ff5a5f;color:#ffe1e3}.collapsed-actions,.status-actions,.quick-notes{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.collapsed-actions a,.collapsed-actions button{flex:1;min-width:150px;text-align:center;text-decoration:none}.workflow{display:grid;gap:12px;margin-top:12px}.step{border:1px solid #27322a;border-radius:8px;background:#0a0e0a;padding:12px}.step-title{display:flex;align-items:center;gap:9px;font-size:18px;font-weight:900;margin-bottom:8px}.step-num{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:999px;background:#00c853;color:#031006}.quick-notes button{padding:10px 11px;font-size:13px}.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.photo-box{border:1px solid #263029;border-radius:8px;background:#060806;padding:10px}.photo-box strong{display:block;margin-bottom:8px}.thumbs{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin:8px 0}.thumb{aspect-ratio:1;background:#0b110c;border-radius:6px;overflow:hidden}.thumb img{width:100%;height:100%;object-fit:cover;display:block}.photo-box input{font-size:12px;padding:9px}.photo-box button{width:100%;margin-top:7px;padding:10px;font-size:13px}.log-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.status{display:none;margin:10px 0;border-radius:8px;padding:11px 12px;line-height:1.45}.status.ok{display:block;background:rgba(0,200,83,.1);border:1px solid rgba(0,200,83,.3);color:#e6ffef}.status.bad{display:block;background:rgba(255,90,95,.12);border:1px solid rgba(255,90,95,.4);color:#ffe1e3}.empty{border:1px dashed #313b33;border-radius:8px;padding:18px;text-align:center;color:#8f9991}.autosave{font-size:12px;color:#8f9991;margin-top:8px}@media(max-width:780px){.wrap{padding:12px}.top,.login,.filters{display:block}.nav{margin-top:10px}.photo-grid,.facts,.status-actions,.log-grid{grid-template-columns:1fr}.collapsed-actions,.status-actions{display:grid}button,.login button{width:100%;margin-top:8px}}
</style>
<script>
window.NORDIC_ANALYTICS={ga4MeasurementId:"G-WR90F2DZ4S",gtmContainerId:"",debugMode:new URLSearchParams(window.location.search).has("ga_debug")};
</script>
<script src="/assets/analytics.js" defer></script>
</head>
<body>
<main class="wrap">
  <div class="top">
    <div><h1>Workshop</h1><p class="muted">Lennart-läge: välj kund, tryck Starta, följ stegen. Sidan auto-uppdaterar inte medan du arbetar i ett kundkort.</p></div>
    <div class="nav"><a href="/admin/">Admin</a><a href="/checkout/">Checkout</a><a href="/quick-price/">Snabbpris</a></div>
  </div>

  <section class="panel">
    <div class="login">
      <div><label for="token">Admin-token</label><input id="token" type="password"></div>
      <button id="saveToken">Spara token</button>
      <button class="secondary" id="refresh">Uppdatera</button>
    </div>
    <div class="autosave" id="refreshNote">Auto-refresh är på tills ett jobb öppnas eller någon skriver.</div>
  </section>

  <section class="panel">
    <div class="filters">
      <div><label for="search">Sök jobb</label><input id="search" placeholder="Kund, modell, ärende, problem"></div>
      <div><label for="statusFilter">Visa</label><select id="statusFilter"><option value="">Aktiva/inlämnade</option><option value="checked_in">Inlämnade</option><option value="diagnosing">Diagnos</option><option value="repairing">Pågående</option><option value="waiting_parts">Väntar del</option><option value="waiting_customer">Paus/review</option><option value="ready">Ready for payment</option></select></div>
    </div>
    <div class="status" id="status"></div>
  </section>

  <section class="jobs" id="jobs"><div class="empty">Laddar jobb...</div></section>
</main>

<script>
const tokenInput=document.getElementById('token'),jobsEl=document.getElementById('jobs'),statusEl=document.getElementById('status'),searchInput=document.getElementById('search'),statusFilter=document.getElementById('statusFilter'),refreshNote=document.getElementById('refreshNote');
let cases=[],activeCaseId=null,isEditing=false,lastUserEdit=0;
const statusLabels={new:'Ny',contacted:'Kontaktad',checked_in:'Inlämnad',diagnosing:'Diagnos',repairing:'Pågår',waiting_parts:'Väntar del',waiting_customer:'Paus/review',ready:'Ready for payment',done:'Avslutad'};
const photoLabels={before:'Före',during:'Under arbete',after:'Efter'};
const actionLabels={
  wheel_remove:['Demontering av hjul','Hjul demonterat för åtkomst.'],
  tube_replace:['Byte av slang','Slang bytt och lufttryck kontrollerat.'],
  tire_replace:['Byte av däck','Däck bytt och monterat.'],
  solid_tire_install:['Montering punkteringsfritt däck','Punkteringsfritt däck monterat.'],
  tubeless_sealant:['Tubeless/slime-åtgärd','Tätningsvätska/slime åtgärdad.'],
  brake_adjust:['Bromsjustering','Bromsar justerade och funktionstestade.'],
  brake_part_replace:['Byte av bromsdel','Bromsdel bytt.'],
  throttle_replace:['Byte av gashandtag/tumgas','Gashandtag/tumgas bytt och testat.'],
  display_replace:['Byte av display','Display bytt och funktionstestad.'],
  wiring_check:['Kontroll kablage/kontakter','Kablage och kontakter kontrollerade.'],
  battery_diagnostics:['Batteridiagnos','Batteri/BMS kontrollerat.'],
  bms_check:['Kontroll av BMS','BMS kontrollerat.'],
  test_run:['Funktionstest','Funktionstest genomfört.'],
  safety_check:['Säkerhetskontroll','Säkerhetskontroll utförd.']
};
tokenInput.value=localStorage.getItem('nordicAdminToken')||'';
function html(v){return String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function shortId(id){return String(id||'').replace(/^case_/,'').slice(0,18).toUpperCase()}
function setStatus(msg,bad=false){statusEl.textContent=msg||'';statusEl.className='status '+(msg?(bad?'bad':'ok'):'')}
function cardStatus(card,msg,bad=false){const el=card.querySelector('.card-status');el.textContent=msg||'';el.className='card-status '+(msg?'show ':'')+(bad?'bad':'')}
function info(text,card){if(card)cardStatus(card,text);else setStatus(text)}
async function api(path,options={}){const response=await fetch(path,{...options,headers:{'Content-Type':'application/json','x-admin-token':tokenInput.value.trim(),...(options.headers||{})}});const data=await response.json().catch(()=>({}));if(!response.ok)throw new Error(data.error||'Kunde inte läsa data.');return data}
function activeCases(){const allowed=['checked_in','diagnosing','repairing','waiting_parts','waiting_customer','ready'];return cases.filter(item=>allowed.includes(item.status))}
function approvedWork(item){const rows=item.completion&&Array.isArray(item.completion.priceRows)?item.completion.priceRows:[];if(rows.length)return rows.map(row=>`${row.qty||1} x ${row.name}`).join(', ');return item.completion&&item.completion.workSummary||item.service||'Inte specificerat ännu'}
function doNotDo(item){const internal=item.completion&&item.completion.internalComment;return internal||'Gör inget utanför godkänt arbete/pris utan Sebastian eller kundgodkännande.'}
function nextAction(item){if(item.workshop&&item.workshop.needsSebastianReview)return'Stoppa och invänta Sebastian review.';if(item.status==='waiting_parts')return'Vänta på del, dokumentera vad som saknas.';if(item.status==='ready')return'Redo för betalning/utlämning. Gå till Checkout när kunden hämtar.';if(item.status==='repairing')return'Fortsätt jobbet och dokumentera före/under/efter.';return'Tryck Start job när arbetet faktiskt påbörjas.'}
function doNotDo(item){return item.completion&&item.completion.internalComment||'Gör inget utanför godkänt arbete/pris utan Sebastian eller kundgodkännande.'}
function nextAction(item){const workshop=item.workshop||{};if(workshop.needsSebastianReview)return'Stoppa och invänta Sebastian review.';if(item.status==='waiting_parts')return'Vänta på del, dokumentera vad som saknas.';if(item.status==='ready')return'Redo för betalning/utlämning. Sebastian tar final kundkommunikation.';if(item.status==='repairing')return'Fortsätt jobbet och dokumentera före/under/efter.';return'Tryck Starta och följ stegen.'}
function mediaFor(item,category){return (Array.isArray(item.media)?item.media:[]).filter(entry=>entry.category===category).slice(0,3)}
function markEditing(){isEditing=true;lastUserEdit=Date.now();updateRefreshNote()}
function shouldPauseRefresh(){return Boolean(activeCaseId)||isEditing||Date.now()-lastUserEdit<45000}
function updateRefreshNote(){refreshNote.textContent=shouldPauseRefresh()?'Auto-refresh pausad medan kundkortet är öppet eller text skrivs. Tryck Uppdatera när du vill hämta nytt.':'Auto-refresh är på tills ett jobb öppnas eller någon skriver.'}
function photoHtml(item,category){const thumbs=mediaFor(item,category).map(entry=>`<a class="thumb" href="${html(entry.url)}" target="_blank" rel="noopener"><img src="${html(entry.url)}" alt="${html(photoLabels[category])}"></a>`).join('');return `<div class="photo-box"><strong>${photoLabels[category]}</strong><div class="thumbs">${thumbs||'<div class="muted">Ingen bild</div>'}</div><input type="file" accept="image/*" capture="environment" data-category="${category}"><button type="button" class="secondary upload-photo" data-category="${category}">Ladda upp ${photoLabels[category].toLowerCase()}</button></div>`}
function render(){const q=searchInput.value.trim().toLowerCase();const visible=activeCases().filter(item=>!statusFilter.value||item.status===statusFilter.value).filter(item=>!q||[item.customer&&item.customer.name,item.customer&&item.customer.phone,item.vehicle&&item.vehicle.model,item.service,item.message,shortId(item.id)].join(' ').toLowerCase().includes(q));jobsEl.innerHTML=visible.length?'':'<div class="empty">Inga aktiva/inlämnade jobb matchar filtret.</div>';visible.forEach(item=>jobsEl.appendChild(jobCard(item)));updateRefreshNote()}
function jobCard(item){const card=document.createElement('article');const expanded=activeCaseId===item.id;card.className='job '+(expanded?'active':'');const customer=item.customer||{},vehicle=item.vehicle||{},workshop=item.workshop||{};card.innerHTML=`<div class="job-head"><div><h2>${html(customer.name||'Okänd kund')}</h2><div class="muted">${html(vehicle.model||'Okänd modell')} · ${shortId(item.id)}</div></div><span class="badge ${workshop.needsSebastianReview?'warn':''}">${html(workshop.needsSebastianReview?'Sebastian review':statusLabels[item.status]||item.status)}</span></div><div class="facts"><div class="fact"><span>Telefon</span><b>${html(customer.phone||'Saknas')}</b></div><div class="fact"><span>E-post</span><b>${html(customer.email||'Saknas')}</b></div><div class="fact"><span>Modell</span><b>${html(vehicle.model||'Okänd')}</b></div><div class="fact"><span>Status</span><b>${html(statusLabels[item.status]||item.status)}</b></div></div><div class="box"><strong>Problem</strong><br>${html(item.message||item.service||'Ingen beskrivning')}</div>${expanded?expandedHtml(item):collapsedHtml(customer)}`;
if(expanded)wireExpanded(card,item);else wireCollapsed(card,item);
return card}
function collapsedHtml(customer){return `<div class="collapsed-actions"><button type="button" class="start-card">Starta</button>${customer.phone?`<a class="btn secondary" href="tel:${html(customer.phone)}">Ring kund</a>`:''}</div>`}
function expandedHtml(item){const workshop=item.workshop||{};return `<div class="workflow"><div class="step"><div class="step-title"><span class="step-num">1</span>Starta arbetet</div><div class="status-actions"><button type="button" data-action="start">Starta / pågår</button><button type="button" class="secondary close-card">Stäng kundkort</button></div></div><div class="step"><div class="step-title"><span class="step-num">2</span>Kontrollera gränser</div><div class="box"><strong>Godkänt arbete</strong><br>${html(approvedWork(item))}</div><div class="box stop"><strong>Gör inte utan godkännande</strong><br>${html(doNotDo(item))}</div><div class="box ${workshop.needsSebastianReview?'review':''}"><strong>Nästa steg</strong><br>${html(workshop.nextAction||nextAction(item))}</div></div><div class="step"><div class="step-title"><span class="step-num">3</span>Snabb dokumentation</div><div class="quick-notes"><button type="button" data-note="Punktering/däck kontrollerat.">Punktering klar</button><button type="button" data-note="Bromsar kontrollerade och justerade.">Broms justerad</button><button type="button" data-note="Batteri/laddning testad.">Batteri testat</button><button type="button" data-note="Felkod/display kontrollerad.">Felkod kollad</button><button type="button" data-note="Behöver Sebastian teknisk analys.">Behöver Sebastian</button></div><div class="log-grid"><div><label>Vad gjordes?</label><textarea name="workDone">${html(workshop.workDone||'')}</textarea></div><div><label>Delar använda</label><textarea name="partsUsed">${html(workshop.partsUsed||'')}</textarea></div><div><label>Problem / avvikelse</label><textarea name="issuesFound">${html(workshop.issuesFound||'')}</textarea></div></div><button type="button" class="secondary save-log">Spara logg</button></div><div class="step"><div class="step-title"><span class="step-num">4</span>Bilder</div><div class="photo-grid">${photoHtml(item,'before')}${photoHtml(item,'during')}${photoHtml(item,'after')}</div></div><div class="step"><div class="step-title"><span class="step-num">5</span>Avsluta eller pausa</div><div class="status-actions"><button type="button" class="secondary" data-action="waiting_parts">Väntar del</button><button type="button" class="secondary" data-action="paused">Pausa</button><button type="button" class="warn" data-action="review">Skicka till Sebastian</button><button type="button" data-action="ready">Ready for payment</button></div></div></div>`}
function wireCollapsed(card,item){card.querySelector('.start-card').addEventListener('click',()=>{activeCaseId=item.id;isEditing=false;render();setTimeout(()=>document.querySelector('.job.active')?.scrollIntoView({behavior:'smooth',block:'start'}),0)})}
function wireExpanded(card,item){card.querySelector('.close-card').addEventListener('click',()=>{activeCaseId=null;isEditing=false;render()});card.querySelectorAll('textarea,input').forEach(el=>{el.addEventListener('input',markEditing);el.addEventListener('focus',markEditing)});card.querySelectorAll('[data-note]').forEach(button=>button.addEventListener('click',()=>appendNote(card,'workDone',button.dataset.note)));card.querySelectorAll('.upload-photo').forEach(button=>button.addEventListener('click',()=>uploadPhoto(item,card,button.dataset.category)));card.querySelector('.save-log').addEventListener('click',()=>saveLog(item,card));card.querySelectorAll('[data-action]').forEach(button=>button.addEventListener('click',()=>setJobState(item,card,button.dataset.action)))}
function appendNote(card,field,text){const target=card.querySelector(`[name="${field}"]`);target.value=(target.value?target.value+'\n':'')+text;markEditing()}
function workshopValues(card){return{workDone:card.querySelector('[name="workDone"]')?.value||'',partsUsed:card.querySelector('[name="partsUsed"]')?.value||'',issuesFound:card.querySelector('[name="issuesFound"]')?.value||''}}
async function patchCase(item,payload){await api('/api/cases/'+encodeURIComponent(item.id),{method:'PATCH',body:JSON.stringify(payload)});isEditing=false;lastUserEdit=0;await loadCases(true,true)}
async function saveLog(item,card){try{setStatus('Sparar logg...');await patchCase(item,{workshop:workshopValues(card),note:'Workshoplogg uppdaterad.'});setStatus('Logg sparad.')}catch(error){setStatus(error.message,true)}}
async function setJobState(item,card,action){try{const values=workshopValues(card);const map={start:{status:'repairing',nextAction:'Jobbet är startat. Följ steg 2-5 och dokumentera kort.',review:false,note:'Workshop: jobb startat.'},paused:{status:'waiting_customer',nextAction:'Pausad. Skriv varför i loggen och invänta nästa beslut.',review:false,note:'Workshop: jobb pausat.'},waiting_parts:{status:'waiting_parts',nextAction:'Väntar på del. Dokumentera del i loggen.',review:false,note:'Workshop: väntar på del.'},review:{status:'waiting_customer',nextAction:'Sebastian behöver granska innan kund kontaktas eller arbetet fortsätter.',review:true,note:'Workshop: Needs Sebastian review.'},ready:{status:'ready',nextAction:'Ready for payment. Sebastian tar final pris/kundkommunikation.',review:false,note:'Workshop: ready for payment.'}}[action];setStatus('Uppdaterar status...');await patchCase(item,{status:map.status,workshop:{...values,nextAction:map.nextAction,needsSebastianReview:map.review,reviewRequestedAt:map.review?new Date().toISOString():null},note:map.note});setStatus('Status uppdaterad.')}catch(error){setStatus(error.message,true)}}
async function uploadPhoto(item,card,category){try{const input=card.querySelector(`input[data-category="${category}"]`);if(!input.files||!input.files.length){setStatus('Välj en bild först.',true);return}const form=new FormData();form.append('category',category);form.append('publicOk','false');form.append('note',photoLabels[category]);[...input.files].forEach(file=>form.append('files',file,file.name));setStatus('Laddar upp bild...');const response=await fetch('/api/cases/'+encodeURIComponent(item.id)+'/media',{method:'POST',headers:{'x-admin-token':tokenInput.value.trim()},body:form});const data=await response.json().catch(()=>({}));if(!response.ok)throw new Error(data.error||'Kunde inte ladda upp bild.');input.value='';isEditing=false;await loadCases(true,true);setStatus('Bild uppladdad.')}catch(error){setStatus(error.message,true)}}
async function loadCases(background=false,force=false){try{if(background&&!force&&shouldPauseRefresh()){updateRefreshNote();return}if(!background)setStatus('Laddar jobb...');const data=await api('/api/cases');cases=data.cases||[];render();if(!background)setStatus(`Laddat ${activeCases().length} aktiva/inlämnade jobb.`)}catch(error){setStatus(error.message,true)}}
document.getElementById('saveToken').addEventListener('click',()=>{localStorage.setItem('nordicAdminToken',tokenInput.value.trim());setStatus('Token sparad.')});
document.getElementById('refresh').addEventListener('click',()=>{activeCaseId=null;isEditing=false;lastUserEdit=0;loadCases()});
searchInput.addEventListener('input',()=>{markEditing();render()});
statusFilter.addEventListener('change',render);
loadCases();
setInterval(()=>loadCases(true),45000);
</script>
</body>
</html>
