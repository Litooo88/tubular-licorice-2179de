<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Verkstadsdashboard | Nordic E-Mobility</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Inter,Arial,sans-serif;background:#050705;color:#f6f8f5}
a{color:#00c853}
.wrap{max-width:1280px;margin:0 auto;padding:28px}
.top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px}
h1{margin:0;font-size:34px;line-height:1}
.muted{color:#a8b0aa}
.login,.card,.case{background:#111513;border:1px solid #273129;border-radius:8px}
.login{padding:22px;margin-bottom:24px;display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:end}
label{display:block;font-size:12px;color:#a8b0aa;text-transform:uppercase;font-weight:800;letter-spacing:.08em;margin-bottom:6px}
input,select,textarea{width:100%;background:#050705;border:1px solid #273129;border-radius:8px;color:#f6f8f5;padding:11px 12px;font:inherit}
button{border:0;border-radius:8px;background:#00c853;color:#061006;font-weight:900;padding:12px 16px;cursor:pointer}
button.secondary{background:transparent;color:#f6f8f5;border:1px solid #f6f8f5}
button:disabled{opacity:.6;cursor:wait}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.card{padding:18px}
.card b{display:block;font-size:28px}
.toolbar{display:flex;gap:10px;align-items:center;justify-content:space-between;margin:18px 0;flex-wrap:wrap}
.cases{display:grid;gap:12px}
.case{padding:18px;display:grid;grid-template-columns:1.4fr 1fr 1.2fr;gap:16px}
.case h2{font-size:20px;margin:0 0 6px}
.badge{display:inline-flex;border-radius:999px;background:rgba(0,200,83,.12);border:1px solid rgba(0,200,83,.28);color:#9fffc1;padding:4px 8px;font-size:12px;font-weight:900}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
.note{grid-column:1/-1}
.small{font-size:13px;color:#a8b0aa}
.empty{padding:28px;text-align:center;color:#a8b0aa;border:1px dashed #273129;border-radius:8px}
.error{padding:14px 16px;border-radius:8px;background:rgba(255,90,95,.1);border:1px solid rgba(255,90,95,.35);color:#ffd6d8;margin-bottom:14px;display:none}
@media(max-width:900px){.login,.case,.stats{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body>
<main class="wrap">
  <div class="top">
    <div>
      <h1>Verkstadsdashboard</h1>
      <p class="muted">Aktiva kunder, status, inlämning, kontakt och uppskattat ärendevärde.</p>
    </div>
    <a href="/">Till startsidan</a>
  </div>

  <section class="login">
    <div>
      <label for="token">Admin-token</label>
      <input id="token" type="password" autocomplete="current-password" placeholder="ADMIN_TOKEN från Netlify">
    </div>
    <button id="saveToken">Spara token</button>
    <button class="secondary" id="refresh">Uppdatera</button>
  </section>

  <div class="error" id="error"></div>

  <section class="stats">
    <div class="card"><span class="muted">Aktiva ärenden</span><b id="activeTotal">0</b></div>
    <div class="card"><span class="muted">Totalt värde</span><b id="valueTotal">0 kr</b></div>
    <div class="card"><span class="muted">Nya bokningar</span><b id="newTotal">0</b></div>
    <div class="card"><span class="muted">Redo att lämna ut</span><b id="readyTotal">0</b></div>
  </section>

  <div class="toolbar">
    <div class="muted" id="lastUpdated">Inte laddad ännu</div>
    <select id="filter">
      <option value="">Alla statusar</option>
      <option value="new">Ny</option>
      <option value="contacted">Kontaktad</option>
      <option value="checked_in">Inlämnad</option>
      <option value="diagnosing">Felsökning</option>
      <option value="waiting_parts">Väntar delar</option>
      <option value="repairing">Reparerar</option>
      <option value="ready">Klar</option>
      <option value="done">Avslutad</option>
    </select>
  </div>

  <section class="cases" id="cases"></section>
</main>

<script>
const statusLabels={
  new:'Ny',
  contacted:'Kontaktad',
  checked_in:'Inlämnad',
  diagnosing:'Felsökning',
  waiting_parts:'Väntar delar',
  repairing:'Reparerar',
  ready:'Klar',
  done:'Avslutad',
  archived:'Arkiverad'
};
const tokenInput=document.getElementById('token');
const saveToken=document.getElementById('saveToken');
const refreshBtn=document.getElementById('refresh');
const casesEl=document.getElementById('cases');
const filterEl=document.getElementById('filter');
const errorEl=document.getElementById('error');
let cases=[];

tokenInput.value=localStorage.getItem('nordicAdminToken')||'';
saveToken.addEventListener('click',()=>{localStorage.setItem('nordicAdminToken',tokenInput.value.trim());loadCases();});
refreshBtn.addEventListener('click',loadCases);
filterEl.addEventListener('change',render);

function money(value){return new Intl.NumberFormat('sv-SE',{style:'currency',currency:'SEK',maximumFractionDigits:0}).format(Number(value||0));}
function dateShort(value){return value?new Date(value).toLocaleString('sv-SE'):'Saknas';}
function showError(message){errorEl.textContent=message;errorEl.style.display=message?'block':'none';}

async function api(path,options={}){
  const token=tokenInput.value.trim();
  const response=await fetch(path,{...options,headers:{'Content-Type':'application/json','x-admin-token':token,...(options.headers||{})}});
  const data=await response.json().catch(()=>({}));
  if(!response.ok) throw new Error(data.error||'Kunde inte läsa data.');
  return data;
}

async function loadCases(){
  try{
    showError('');
    refreshBtn.disabled=true;
    const data=await api('/api/cases');
    cases=data.cases||[];
    render();
    document.getElementById('lastUpdated').textContent='Uppdaterad '+new Date().toLocaleTimeString('sv-SE');
  }catch(error){
    showError(error.message);
  }finally{
    refreshBtn.disabled=false;
  }
}

function render(){
  const active=cases.filter(item=>!['done','archived'].includes(item.status));
  document.getElementById('activeTotal').textContent=active.length;
  document.getElementById('valueTotal').textContent=money(active.reduce((sum,item)=>sum+Number(item.estimatedValue||0),0));
  document.getElementById('newTotal').textContent=cases.filter(item=>item.status==='new').length;
  document.getElementById('readyTotal').textContent=cases.filter(item=>item.status==='ready').length;

  const filter=filterEl.value;
  const visible=filter?cases.filter(item=>item.status===filter):cases;
  casesEl.innerHTML='';

  if(!visible.length){
    casesEl.innerHTML='<div class="empty">Inga ärenden att visa.</div>';
    return;
  }

  for(const item of visible){
    const el=document.createElement('article');
    el.className='case';
    el.innerHTML=`
      <div>
        <span class="badge">${statusLabels[item.status]||item.status}</span>
        <h2>${escapeHtml(item.customer?.name||'Okänd kund')}</h2>
        <div class="small">${escapeHtml(item.vehicle?.model||'Okänd modell')}</div>
        <p>${escapeHtml(item.message||'Ingen beskrivning')}</p>
        <div class="small">Skapad: ${dateShort(item.createdAt)}</div>
      </div>
      <div>
        <div><b>Kontakt</b></div>
        <div><a href="tel:${escapeHtml(item.customer?.phone||'')}">${escapeHtml(item.customer?.phone||'Saknas')}</a></div>
        <div><a href="mailto:${escapeHtml(item.customer?.email||'')}">${escapeHtml(item.customer?.email||'Ingen e-post')}</a></div>
        <p class="small">Tjänst: ${escapeHtml(item.service||'Annat')}<br>Värde: ${money(item.estimatedValue)}</p>
      </div>
      <form data-id="${escapeHtml(item.id)}">
        <div class="row">
          <div><label>Status</label><select name="status">${Object.entries(statusLabels).map(([value,label])=>`<option value="${value}" ${item.status===value?'selected':''}>${label}</option>`).join('')}</select></div>
          <div><label>Värde</label><input name="estimatedValue" type="number" min="0" step="1" value="${Number(item.estimatedValue||0)}"></div>
        </div>
        <div class="row">
          <div><label>Inlämnad</label><input name="intakeAt" type="datetime-local" value="${toLocalInput(item.intakeAt)}"></div>
          <div><label>Klar senast</label><input name="promisedAt" type="datetime-local" value="${toLocalInput(item.promisedAt)}"></div>
        </div>
        <div class="note"><label>Intern notering</label><textarea name="note" rows="2" placeholder="Ex: väntar på däck, ring kund, offert skickad"></textarea></div>
        <button type="submit">Spara ärende</button>
      </form>`;
    casesEl.appendChild(el);
  }

  casesEl.querySelectorAll('form').forEach(form=>{
    form.addEventListener('submit',async(event)=>{
      event.preventDefault();
      const button=form.querySelector('button');
      button.disabled=true;
      button.textContent='Sparar...';
      const body=Object.fromEntries(new FormData(form).entries());
      try{
        await api('/api/cases/'+encodeURIComponent(form.dataset.id),{method:'PATCH',body:JSON.stringify(body)});
        await loadCases();
      }catch(error){
        showError(error.message);
      }finally{
        button.disabled=false;
        button.textContent='Spara ärende';
      }
    });
  });
}

function toLocalInput(value){
  if(!value) return '';
  const date=new Date(value);
  if(Number.isNaN(date.getTime())) return '';
  const pad=(num)=>String(num).padStart(2,'0');
  return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
}

function escapeHtml(value){
  return String(value||'').replace(/[&<>"']/g,(char)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[char]));
}

loadCases();
setInterval(loadCases,10000);
</script>
</body>
</html>
